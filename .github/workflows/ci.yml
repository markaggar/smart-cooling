name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -r requirements_dev.txt
      
      - name: Run ruff
        run: ruff check .
      
      - name: Run mypy
        run: mypy custom_components/smart_cooling --ignore-missing-imports

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_dev.txt
      
      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=custom_components/smart_cooling --cov-report=xml --cov-report=term-missing
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  validate-hacs:
    name: Validate for HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

  deploy-dev:
    name: Deploy to HA Dev
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Home Assistant Dev
        env:
          HA_DEV_HOST: ${{ secrets.HA_DEV_HOST }}
          HA_DEV_TOKEN: ${{ secrets.HA_DEV_TOKEN }}
          HA_DEV_SSH_KEY: ${{ secrets.HA_DEV_SSH_KEY }}
        run: |
          # Create SSH key file
          mkdir -p ~/.ssh
          echo "$HA_DEV_SSH_KEY" > ~/.ssh/ha_dev_key
          chmod 600 ~/.ssh/ha_dev_key
          
          # Sync custom_components to HA Dev
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/ha_dev_key -o StrictHostKeyChecking=no" \
            custom_components/smart_cooling/ \
            root@$HA_DEV_HOST:/config/custom_components/smart_cooling/
          
          # Restart Home Assistant to load changes
          curl -X POST \
            -H "Authorization: Bearer $HA_DEV_TOKEN" \
            -H "Content-Type: application/json" \
            "http://$HA_DEV_HOST:8123/api/services/homeassistant/restart"
          
          echo "Deployed to HA Dev and triggered restart"

  historical-test:
    name: Historical Data Tests
    needs: [test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_dev.txt
      
      - name: Run historical data tests
        run: |
          pytest tests/test_historical_replay.py -v --tb=short
