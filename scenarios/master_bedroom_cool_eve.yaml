# Master Bedroom — Cool evening, fan should defer to ~9 PM
#
# This mirrors the real-world scenario that triggered the forward-scan redesign:
# outdoor air is barely cooler than indoor NOW, but drops significantly by target time.
# The engine should NOT start the fan immediately — it should find the latest viable
# start time and say "Start fan by 9:00 PM" rather than "NOW!"

