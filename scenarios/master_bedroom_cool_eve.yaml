  Room 68°F at 4 PM, outdoor 65°F but dropping to 53°F by 10 PM.
  Target 63°F by 10:00 PM (6h window).  AQI clean.
  Expected: start_fan, deferred ("by" in timing, not NOW!).

expected_method: start_fan
expected_timing_contains: "by"

